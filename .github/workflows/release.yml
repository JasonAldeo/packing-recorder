name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          npm version $version --no-git-tag-version

      - name: Build Windows installer + MSIX (unsigned)
        run: npm run dist -- -p never

      - name: Locate build artifacts
        id: artifacts
        shell: pwsh
        run: |
          $exe  = "dist/PackingRecorder-Setup.exe"
          $appx = Get-ChildItem dist -Filter "*.appx" | Select-Object -First 1 -ExpandProperty FullName
          echo "exe=$exe"          >> $env:GITHUB_OUTPUT
          echo "appx=$appx"        >> $env:GITHUB_OUTPUT
          echo "Found appx: $appx"

      - name: Upload unsigned installer for signing
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: PackingRecorder-Setup-unsigned
          path: dist/PackingRecorder-Setup.exe
          archive: false

      - name: Sign installer with SignPath
        continue-on-error: true
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: packing-recorder
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist/signed

      - name: Create GitHub Release with installer and MSIX
        shell: pwsh
        run: |
          $installer = if (Test-Path "dist/signed/PackingRecorder-Setup.exe") {
            "dist/signed/PackingRecorder-Setup.exe"
          } else {
            "dist/PackingRecorder-Setup.exe"
          }
          $appx = "${{ steps.artifacts.outputs.appx }}"
          $files = @($installer, "dist/latest.yml")
          if ($appx -and (Test-Path $appx)) { $files += $appx }
          gh release create ${{ github.ref_name }} @files `
            --title "${{ github.ref_name }}" `
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify license server of new version
        shell: pwsh
        continue-on-error: true
        run: |
          Invoke-RestMethod -Uri "https://packingrecorder.com/set-version" `
            -Method POST `
            -Headers @{ "Authorization" = "Bearer ${{ secrets.VERSION_UPDATE_TOKEN }}"; "Content-Type" = "application/json" } `
            -Body (ConvertTo-Json @{ version = "${{ github.ref_name }}" })
