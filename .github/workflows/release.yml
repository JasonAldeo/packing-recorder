name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist -- -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify license server of new version
        run: |
          curl -s -X POST https://packing-recorder-production.up.railway.app/set-version \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.VERSION_UPDATE_TOKEN }}" \
            -d "{\"version\": \"${{ github.ref_name }}\"}"
