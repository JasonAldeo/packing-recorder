<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – Packing Recorder</title>
  <link rel="icon" type="image/x-icon" href="/icon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="/icon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 50%, #f5f0ff 100%);
      min-height: 100vh;
      color: #1e293b;
      padding: 32px 16px;
    }

    .page-wrap {
      max-width: 440px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #3b5bdb, #7c3aed);
      border-radius: 14px;
      margin-bottom: 14px;
    }
    .logo-mark svg { width: 28px; height: 28px; fill: #fff; }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: -0.3px;
    }
    .header p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: #64748b;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(59, 91, 219, 0.10);
      padding: 32px 28px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 6px;
    }
    .card .subtitle {
      font-size: 0.88rem;
      color: #64748b;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ── Form ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #1e293b;
      background: #f8fafc;
      transition: border-color 0.15s;
      outline: none;
    }
    .field input:focus { border-color: #3b5bdb; background: #fff; }

    /* ── Button ── */
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3b5bdb, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.92; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Feedback ── */
    .feedback {
      display: none;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .feedback.error   { display: block; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .feedback.success { display: block; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

    /* ── Success state ── */
    .success-state {
      display: none;
      text-align: center;
      padding: 8px 0;
    }
    .success-state .check-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .success-state h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #16a34a;
      margin-bottom: 8px;
    }
    .success-state p {
      font-size: 0.9rem;
      color: #475569;
      line-height: 1.5;
    }

    /* ── Invalid state ── */
    .invalid-state {
      display: none;
      text-align: center;
      padding: 8px 0;
    }
    .invalid-state .x-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .invalid-state h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #dc2626;
      margin-bottom: 8px;
    }
    .invalid-state p {
      font-size: 0.9rem;
      color: #475569;
      line-height: 1.5;
    }

    /* ── Lang toggle ── */
    .lang-bar {
      text-align: center;
      margin-bottom: 20px;
    }
    .lang-bar button {
      background: none;
      border: 1.5px solid #cbd5e1;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      margin: 0 3px;
      transition: border-color 0.15s, color 0.15s;
    }
    .lang-bar button.active {
      border-color: #3b5bdb;
      color: #3b5bdb;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 12px;
    }
    .footer a { color: #3b5bdb; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="page-wrap">

    <div class="lang-bar">
      <button id="lang-id" class="active" onclick="setLang('id')">ID</button>
      <button id="lang-en" onclick="setLang('en')">EN</button>
    </div>

    <div class="header">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 7H4a2 2 0 00-2 2v9a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
          <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
        </svg>
      </div>
      <h1>Packing Recorder</h1>
      <p id="header-sub"></p>
    </div>

    <div class="card">
      <!-- Invalid / missing token state -->
      <div class="invalid-state" id="invalid-state">
        <div class="x-icon">&#10060;</div>
        <h3 id="invalid-title"></h3>
        <p id="invalid-desc"></p>
      </div>

      <!-- Reset form -->
      <div id="reset-form-wrap">
        <h2 id="form-title"></h2>
        <p class="subtitle" id="form-subtitle"></p>

        <div class="feedback" id="feedback"></div>

        <div class="field">
          <label id="label-new-pass" for="new-password"></label>
          <input type="password" id="new-password" autocomplete="new-password" />
        </div>
        <div class="field">
          <label id="label-confirm-pass" for="confirm-password"></label>
          <input type="password" id="confirm-password" autocomplete="new-password" />
        </div>

        <button class="btn-primary" id="submit-btn"></button>
      </div>

      <!-- Success state -->
      <div class="success-state" id="success-state">
        <div class="check-icon">&#9989;</div>
        <h3 id="success-title"></h3>
        <p id="success-desc"></p>
      </div>
    </div>

    <div class="footer">
      <span id="footer-help"></span>
      <a href="mailto:aldeojason@gmail.com">aldeojason@gmail.com</a>
    </div>

  </div>

  <script>
    // ── Translations ──────────────────────────────────────────────────────────
    const TEXTS = {
      id: {
        headerSub:      'Atur ulang kata sandi akun Anda',
        formTitle:      'Buat kata sandi baru',
        formSubtitle:   'Masukkan kata sandi baru Anda di bawah ini. Minimal 6 karakter.',
        labelNewPass:   'Kata sandi baru',
        labelConfirm:   'Konfirmasi kata sandi',
        submitBtn:      'Simpan Kata Sandi Baru',
        submitting:     'Menyimpan…',
        successTitle:   'Kata sandi berhasil diubah!',
        successDesc:    'Kembali ke aplikasi Packing Recorder dan login dengan kata sandi baru Anda.',
        invalidTitle:   'Link tidak valid',
        invalidDesc:    'Link reset kata sandi ini tidak valid atau sudah kadaluarsa. Silakan ajukan permintaan reset baru dari aplikasi.',
        errMismatch:    'Kata sandi tidak cocok.',
        errTooShort:    'Kata sandi minimal 6 karakter.',
        errEmpty:       'Harap isi semua kolom.',
        errServer:      'Terjadi kesalahan. Silakan coba lagi.',
        errInvalidLink: 'Link reset tidak valid atau sudah kadaluarsa.',
        footerHelp:     'Butuh bantuan? Hubungi ',
      },
      en: {
        headerSub:      'Reset your Packing Recorder account password',
        formTitle:      'Create a new password',
        formSubtitle:   'Enter your new password below. Minimum 6 characters.',
        labelNewPass:   'New password',
        labelConfirm:   'Confirm password',
        submitBtn:      'Save New Password',
        submitting:     'Saving…',
        successTitle:   'Password updated!',
        successDesc:    'Return to the Packing Recorder app and log in with your new password.',
        invalidTitle:   'Invalid link',
        invalidDesc:    'This password reset link is invalid or has expired. Please request a new reset from the app.',
        errMismatch:    'Passwords do not match.',
        errTooShort:    'Password must be at least 6 characters.',
        errEmpty:       'Please fill in all fields.',
        errServer:      'Server error. Please try again.',
        errInvalidLink: 'Reset link is invalid or has expired.',
        footerHelp:     'Need help? Contact ',
      },
    };

    // ── State ─────────────────────────────────────────────────────────────────
    let lang = localStorage.getItem('pr_site_lang') || 'id';
    let resetToken = null;

    function T(key) { return (TEXTS[lang] || TEXTS.id)[key] || key; }

    function setLang(l) {
      lang = l;
      localStorage.setItem('pr_site_lang', l);
      document.getElementById('lang-id').classList.toggle('active', l === 'id');
      document.getElementById('lang-en').classList.toggle('active', l === 'en');
      applyTranslations();
    }

    function applyTranslations() {
      document.getElementById('header-sub').textContent      = T('headerSub');
      document.getElementById('form-title').textContent      = T('formTitle');
      document.getElementById('form-subtitle').textContent   = T('formSubtitle');
      document.getElementById('label-new-pass').textContent  = T('labelNewPass');
      document.getElementById('label-confirm-pass').textContent = T('labelConfirm');
      document.getElementById('submit-btn').textContent      = T('submitBtn');
      document.getElementById('success-title').textContent   = T('successTitle');
      document.getElementById('success-desc').textContent    = T('successDesc');
      document.getElementById('invalid-title').textContent   = T('invalidTitle');
      document.getElementById('invalid-desc').textContent    = T('invalidDesc');
      document.getElementById('footer-help').textContent     = T('footerHelp');
    }

    function showFeedback(type, msg) {
      const el = document.getElementById('feedback');
      el.className = 'feedback ' + type;
      el.textContent = msg;
    }

    function clearFeedback() {
      const el = document.getElementById('feedback');
      el.className = 'feedback';
      el.textContent = '';
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    (function init() {
      // Apply initial lang
      document.getElementById('lang-id').classList.toggle('active', lang === 'id');
      document.getElementById('lang-en').classList.toggle('active', lang === 'en');
      applyTranslations();

      // Parse token from URL
      const params = new URLSearchParams(window.location.search);
      resetToken = params.get('token');

      if (!resetToken || resetToken.trim().length === 0) {
        document.getElementById('reset-form-wrap').style.display = 'none';
        document.getElementById('invalid-state').style.display   = 'block';
        return;
      }

      // Wire up submit
      document.getElementById('submit-btn').addEventListener('click', doReset);
      document.getElementById('confirm-password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doReset();
      });
      document.getElementById('new-password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doReset();
      });
    })();

    // ── Submit handler ────────────────────────────────────────────────────────
    async function doReset() {
      const newPassword     = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      clearFeedback();

      if (!newPassword || !confirmPassword) {
        showFeedback('error', T('errEmpty'));
        return;
      }
      if (newPassword.length < 6) {
        showFeedback('error', T('errTooShort'));
        return;
      }
      if (newPassword !== confirmPassword) {
        showFeedback('error', T('errMismatch'));
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = T('submitting');

      try {
        const resp = await fetch('/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: resetToken, newPassword }),
        });
        const data = await resp.json();

        if (resp.ok && data.ok) {
          document.getElementById('reset-form-wrap').style.display = 'none';
          document.getElementById('success-state').style.display   = 'block';
        } else {
          const msg = data.error || T('errServer');
          // If the server says link is invalid/expired, show the invalid state instead
          if (resp.status === 400 && data.error && data.error.toLowerCase().includes('invalid')) {
            document.getElementById('reset-form-wrap').style.display = 'none';
            document.getElementById('invalid-state').style.display   = 'block';
          } else {
            showFeedback('error', msg);
            btn.disabled = false;
            btn.textContent = T('submitBtn');
          }
        }
      } catch (_) {
        showFeedback('error', T('errServer'));
        btn.disabled = false;
        btn.textContent = T('submitBtn');
      }
    }
  </script>
</body>
</html>
