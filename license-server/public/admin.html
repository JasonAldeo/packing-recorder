<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Packing Recorder</title>
  <link rel="icon" type="image/x-icon" href="/icon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="/icon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .page-wrap {
      max-width: 620px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .header-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b5bdb, #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-logo svg { width: 22px; height: 22px; fill: #fff; }
    .header-text h1 {
      font-size: 1.1rem;
      font-weight: 800;
      color: #f1f5f9;
    }
    .header-text p {
      font-size: 0.78rem;
      color: #475569;
      margin-top: 2px;
    }
    .admin-badge {
      margin-left: auto;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #818cf8;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Card ── */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    /* ── Form ── */
    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus {
      border-color: #3b5bdb;
    }
    .input-row input::placeholder { color: #475569; }

    /* ── Buttons ── */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, #3b5bdb, #7c3aed);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-grant {
      background: #16a34a;
      color: #fff;
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      font-size: 0.92rem;
    }
    .btn-grant:hover:not(:disabled) { opacity: 0.88; }

    /* ── User result ── */
    .user-result { display: none; }
    .user-result.visible { display: block; }

    .user-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .meta-item {}
    .meta-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #475569;
      margin-bottom: 3px;
    }
    .meta-value {
      font-size: 0.9rem;
      color: #e2e8f0;
      font-weight: 600;
    }
    .meta-value.license-active { color: #4ade80; }
    .meta-value.license-none   { color: #f87171; }

    /* ── Orders table ── */
    .orders-section { margin-top: 16px; }
    .orders-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #475569;
      margin-bottom: 8px;
    }
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .orders-table th {
      text-align: left;
      padding: 6px 10px;
      color: #475569;
      font-weight: 600;
      border-bottom: 1px solid #334155;
    }
    .orders-table td {
      padding: 7px 10px;
      color: #94a3b8;
      border-bottom: 1px solid #1e293b;
    }
    .orders-table tr:last-child td { border-bottom: none; }
    .status-paid     { color: #4ade80; font-weight: 700; }
    .status-pending  { color: #fbbf24; }
    .status-other    { color: #f87171; }
    .recovered-yes   { color: #818cf8; font-size: 0.72rem; }
    .recovered-no    { color: #475569; font-size: 0.72rem; }
    .no-orders       { color: #475569; font-size: 0.82rem; font-style: italic; padding: 8px 0; }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid #334155;
      margin: 16px 0;
    }

    /* ── Feedback ── */
    .feedback {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .feedback.visible { display: block; }
    .feedback.success {
      background: #14532d;
      border: 1px solid #166534;
      color: #4ade80;
    }
    .feedback.error {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #f87171;
    }
    .feedback.info {
      background: #1e1b4b;
      border: 1px solid #312e81;
      color: #a5b4fc;
    }

    /* ── Pricing inputs ── */
    .pricing-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .pricing-field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #475569;
      margin-bottom: 6px;
    }
    .pricing-field input {
      width: 100%;
      padding: 10px 14px;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.15s;
    }
    .pricing-field input:focus { border-color: #3b5bdb; }
    .pricing-field input::placeholder { color: #475569; }
    .pricing-field.full { grid-column: 1 / -1; }
    .pricing-status {
      margin-top: 14px;
      padding: 12px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      font-size: 0.82rem;
      color: #94a3b8;
      line-height: 1.6;
    }
    .pricing-status .eff-price { color: #4ade80; font-weight: 700; font-size: 1rem; }
    .pricing-status .promo-badge {
      display: inline-block;
      background: #7c3aed;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .btn-save-pricing {
      background: linear-gradient(135deg, #3b5bdb, #7c3aed);
      color: #fff;
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      font-size: 0.92rem;
    }
    .btn-save-pricing:hover:not(:disabled) { opacity: 0.88; }
      text-align: center;
      font-size: 0.72rem;
      color: #1e293b;
      margin-top: 32px;
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 19.83 2.45 19.11 1 17.76 1 16V8l8-5 8 5v.06zM11 13H9v2H7v2h2v2h2v-2h2v-2h-2v-2zm6-1.97V16c0 3.31-4 5-4 5s-4-1.69-4-5V11.03L17 8.1v2.93z"/></svg>
    </div>
    <div class="header-text">
      <h1>Packing Recorder</h1>
      <p>License Administration Panel</p>
    </div>
    <div class="admin-badge">Admin</div>
  </div>

  <!-- Lookup -->
  <div class="card">
    <div class="card-title">Look Up User</div>
    <div class="input-row">
      <input type="email" id="email-input" placeholder="user@example.com" autocomplete="off" />
      <button class="btn btn-primary" id="lookup-btn" onclick="lookupUser()">Look Up</button>
    </div>
    <div id="lookup-feedback" class="feedback"></div>
  </div>

  <!-- User result -->
  <div class="card user-result" id="user-result">
    <div class="card-title">User Details</div>

    <div class="user-meta">
      <div class="meta-item">
        <div class="meta-label">Username</div>
        <div class="meta-value" id="res-username">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Email</div>
        <div class="meta-value" id="res-email">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Role</div>
        <div class="meta-value" id="res-role">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Registered</div>
        <div class="meta-value" id="res-created">—</div>
      </div>
      <div class="meta-item" style="grid-column: 1 / -1;">
        <div class="meta-label">License Status</div>
        <div class="meta-value" id="res-license">—</div>
      </div>
    </div>

    <div class="orders-section">
      <div class="orders-label">Orders</div>
      <div id="orders-container"></div>
    </div>

    <hr class="divider" />

    <button class="btn btn-grant" id="grant-btn" onclick="grantLicense()">
      ＋ Grant 30 Days to This User
    </button>
    <div id="grant-feedback" class="feedback"></div>
  </div>

  <!-- Pricing Management -->
  <div class="card">
    <div class="card-title">Pricing</div>

    <div class="pricing-grid">
      <div class="pricing-field">
        <label>Published Price (IDR)</label>
        <input type="number" id="price-published" placeholder="199000" min="1" />
      </div>
      <div class="pricing-field">
        <label>RSP / Selling Price (IDR)</label>
        <input type="number" id="price-rsp" placeholder="149000" min="1" />
      </div>
    </div>

    <div class="pricing-status" id="pricing-status">Loading current pricing…</div>

    <button class="btn btn-save-pricing" id="save-pricing-btn" onclick="savePricing()">Save Pricing</button>
    <div id="pricing-feedback" class="feedback"></div>
  </div>

  <!-- Promo Banner -->
  <div class="card">
    <div class="card-title">Promo Banner</div>

    <div class="pricing-grid">
      <div class="pricing-field">
        <label>Promo Label (Indonesian)</label>
        <input type="text" id="promo-label-id" placeholder="Promo Peluncuran" />
      </div>
      <div class="pricing-field">
        <label>Promo Label (English)</label>
        <input type="text" id="promo-label-en" placeholder="Launching Promo" />
      </div>
      <div class="pricing-field full">
        <label>Promo End Date &amp; Time (leave blank to disable promo)</label>
        <input type="datetime-local" id="promo-ends-at" />
      </div>
    </div>

    <div class="pricing-status" id="promo-status">Loading promo status…</div>

    <button class="btn btn-save-pricing" id="save-promo-btn" onclick="savePromo()">Save Promo</button>
    <div id="promo-feedback" class="feedback"></div>
  </div>

  <div class="page-footer">Packing Recorder &mdash; Aldeo Studio &mdash; Admin Panel</div>

</div>
<script>
  const SERVER = '';
  let currentEmail = null;
  let _currentConfig = {}; // in-memory cache so each save button can merge both cards

  function showFeedback(elId, type, msg) {
    const el = document.getElementById(elId);
    el.textContent = msg;
    el.className = `feedback ${type} visible`;
  }
  function hideFeedback(elId) {
    const el = document.getElementById(elId);
    el.className = 'feedback';
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  async function lookupUser() {
    const email = document.getElementById('email-input').value.trim();
    if (!email) { showFeedback('lookup-feedback', 'error', 'Please enter an email address.'); return; }

    hideFeedback('lookup-feedback');
    hideFeedback('grant-feedback');
    const btn = document.getElementById('lookup-btn');
    btn.disabled = true;
    btn.textContent = 'Looking up…';

    try {
      const res = await fetch(`${SERVER}/admin/lookup-user`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();

      if (!res.ok) {
        showFeedback('lookup-feedback', 'error', data.error || 'User not found.');
        document.getElementById('user-result').classList.remove('visible');
        currentEmail = null;
        return;
      }

      // Populate user details
      currentEmail = data.email;
      document.getElementById('res-username').textContent = data.username;
      document.getElementById('res-email').textContent = data.email;
      document.getElementById('res-role').textContent = data.role;
      document.getElementById('res-created').textContent = formatDate(data.createdAt);

      const licenseEl = document.getElementById('res-license');
      if (data.licenseExpiresAt) {
        const daysLeft = Math.ceil((new Date(data.licenseExpiresAt) - new Date()) / 86400000);
        licenseEl.textContent = `Active — expires ${formatDate(data.licenseExpiresAt)} (${daysLeft} days left)`;
        licenseEl.className = 'meta-value license-active';
      } else {
        licenseEl.textContent = 'No active license';
        licenseEl.className = 'meta-value license-none';
      }

      // Populate orders table
      const container = document.getElementById('orders-container');
      if (!data.orders || data.orders.length === 0) {
        container.innerHTML = '<div class="no-orders">No orders found for this user.</div>';
      } else {
        let html = `<table class="orders-table">
          <thead><tr>
            <th>Order ID</th>
            <th>Status</th>
            <th>Date</th>
            <th>Recovered</th>
          </tr></thead><tbody>`;
        for (const o of data.orders) {
          const statusClass = o.status === 'paid' ? 'status-paid'
            : o.status === 'pending' ? 'status-pending' : 'status-other';
          const recoveredText = o.recovered_at
            ? `<span class="recovered-yes">✓ ${formatDate(o.recovered_at)}</span>`
            : `<span class="recovered-no">—</span>`;
          html += `<tr>
            <td style="font-family:monospace;font-size:0.75rem;">${o.order_id}</td>
            <td class="${statusClass}">${o.status}</td>
            <td>${formatDate(o.created_at)}</td>
            <td>${recoveredText}</td>
          </tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
      }

      document.getElementById('user-result').classList.add('visible');

    } catch (err) {
      showFeedback('lookup-feedback', 'error', 'Network error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Look Up';
    }
  }

  async function grantLicense() {
    if (!currentEmail) return;

    const confirmed = confirm(`Grant 30 days to ${currentEmail}?\n\nThis will stack 30 days onto their current license (or create a new one starting now).`);
    if (!confirmed) return;

    hideFeedback('grant-feedback');
    const btn = document.getElementById('grant-btn');
    btn.disabled = true;
    btn.textContent = 'Granting…';

    try {
      const res = await fetch(`${SERVER}/admin/grant-license`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: currentEmail }),
      });
      const data = await res.json();

      if (!res.ok) {
        showFeedback('grant-feedback', 'error', data.error || 'Failed to grant license.');
        return;
      }

      showFeedback('grant-feedback', 'success',
        `✓ 30 days granted to ${data.email}. License now active until ${formatDate(data.newExpiresAt)}.`
      );

      // Refresh the user details to show updated license
      setTimeout(() => lookupUser(), 800);

    } catch (err) {
      showFeedback('grant-feedback', 'error', 'Network error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = '＋ Grant 30 Days to This User';
    }
  }

  // Allow pressing Enter in the email input to trigger lookup
  document.getElementById('email-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') lookupUser();
  });

  // ── Pricing ──────────────────────────────────────────────────────────────────

  function formatIDR(amount) {
    return 'Rp ' + Number(amount).toLocaleString('id-ID');
  }

  function formatDateLocal(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  async function loadPricing() {
    try {
      const res = await fetch(`${SERVER}/pricing`);
      const data = await res.json();
      _currentConfig = { ...data };
      populatePricingFields(data);
      populatePromoFields(data);
      renderPricingStatus(data);
      renderPromoStatus(data);
    } catch (err) {
      document.getElementById('pricing-status').textContent = 'Failed to load pricing.';
      document.getElementById('promo-status').textContent = 'Failed to load promo.';
    }
  }

  function populatePricingFields(data) {
    document.getElementById('price-published').value = data.publishedPrice || '';
    document.getElementById('price-rsp').value = data.rsp || '';
  }

  function populatePromoFields(data) {
    document.getElementById('promo-label-id').value = data.promoLabelId || '';
    document.getElementById('promo-label-en').value = data.promoLabelEn || '';
    if (data.promoEndsAt) {
      const d = new Date(data.promoEndsAt);
      const pad = n => String(n).padStart(2, '0');
      document.getElementById('promo-ends-at').value =
        `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    } else {
      document.getElementById('promo-ends-at').value = '';
    }
  }

  function renderPricingStatus(data) {
    const statusEl = document.getElementById('pricing-status');
    statusEl.innerHTML = `
      <div>Effective price charged: <span class="eff-price">${formatIDR(data.effectivePrice)}</span></div>
      <div style="margin-top:4px">Published: ${formatIDR(data.publishedPrice)} &nbsp;|&nbsp; RSP: ${formatIDR(data.rsp)}</div>
    `;
  }

  function renderPromoStatus(data) {
    const statusEl = document.getElementById('promo-status');
    if (!statusEl) return;
    const promoHtml = data.promoActive
      ? `<span class="promo-badge">${data.promoLabelEn}</span> — ends ${formatDateLocal(data.promoEndsAt)}`
      : '<span style="color:#f87171">No active promo</span>';
    statusEl.innerHTML = `
      <div>Status: ${promoHtml}</div>
      <div style="margin-top:4px">Label ID: ${data.promoLabelId || '—'} &nbsp;|&nbsp; Label EN: ${data.promoLabelEn || '—'}</div>
    `;
  }

  async function savePricing() {
    const publishedPrice = document.getElementById('price-published').value;
    const rsp            = document.getElementById('price-rsp').value;

    if (!publishedPrice || !rsp) {
      showFeedback('pricing-feedback', 'error', 'Published price and RSP are required.');
      return;
    }

    // Merge with cached promo values
    const promoLabelId = _currentConfig.promoLabelId || '';
    const promoLabelEn = _currentConfig.promoLabelEn || '';
    const promoEndsAt  = _currentConfig.promoEndsAt  || null;

    hideFeedback('pricing-feedback');
    const btn = document.getElementById('save-pricing-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const res = await fetch(`${SERVER}/admin/set-pricing`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ publishedPrice, rsp, promoLabelId, promoLabelEn, promoEndsAt }),
      });
      const data = await res.json();

      if (!res.ok) {
        showFeedback('pricing-feedback', 'error', data.error || 'Failed to save pricing.');
        return;
      }

      _currentConfig = { ..._currentConfig, ...data };
      renderPricingStatus(data);
      renderPromoStatus(data);
      showFeedback('pricing-feedback', 'success',
        `✓ Pricing saved. Customers are now charged ${formatIDR(data.effectivePrice)}.`
      );
    } catch (err) {
      showFeedback('pricing-feedback', 'error', 'Network error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Pricing';
    }
  }

  async function savePromo() {
    const promoLabelId   = document.getElementById('promo-label-id').value.trim();
    const promoLabelEn   = document.getElementById('promo-label-en').value.trim();
    const promoEndsAtRaw = document.getElementById('promo-ends-at').value;
    const promoEndsAt    = promoEndsAtRaw ? new Date(promoEndsAtRaw).toISOString() : null;

    // Merge with cached price values
    const publishedPrice = _currentConfig.publishedPrice || '';
    const rsp            = _currentConfig.rsp            || '';

    if (!publishedPrice || !rsp) {
      showFeedback('promo-feedback', 'error', 'Pricing must be loaded before saving promo. Refresh the page.');
      return;
    }

    hideFeedback('promo-feedback');
    const btn = document.getElementById('save-promo-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const res = await fetch(`${SERVER}/admin/set-pricing`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ publishedPrice, rsp, promoLabelId, promoLabelEn, promoEndsAt }),
      });
      const data = await res.json();

      if (!res.ok) {
        showFeedback('promo-feedback', 'error', data.error || 'Failed to save promo.');
        return;
      }

      _currentConfig = { ..._currentConfig, ...data };
      renderPricingStatus(data);
      renderPromoStatus(data);
      showFeedback('promo-feedback', 'success',
        data.promoActive
          ? `✓ Promo active — customers pay ${formatIDR(data.effectivePrice)} until ${formatDateLocal(data.promoEndsAt)}.`
          : '✓ Promo disabled.'
      );
    } catch (err) {
      showFeedback('promo-feedback', 'error', 'Network error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Promo';
    }
  }

  // Load current pricing on page load
  loadPricing();
</script>
</body>
</html>
